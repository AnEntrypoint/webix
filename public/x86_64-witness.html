<!doctype html>
<html><head><meta charset="utf-8"><title>x86_64 witness</title>
<link rel="preload" href="/containers/blinkenlib.wasm" as="fetch" type="application/wasm" crossorigin>
</head>
<body>
<pre id="out">loading...</pre>
<script type="module">
const out=document.getElementById("out");
const log=(m)=>{ out.textContent+="\n"+m };
try{
  const { installWindowDebug } = await import("/src/x86_64-witness-bootstrap.js");
  await installWindowDebug({ onLog: log });
}catch(e){
  log("FAIL: "+(e&&(e.stack||e.message)));
  window.__debug=window.__debug??{};
  window.__debug.x86_64={ ready:true, error:String(e?.message||e) };
}
</script>
</body></html>
